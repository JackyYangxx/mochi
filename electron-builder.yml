appId: com.mochi.app
productName: Mochi
icon: assets/icon.png
directories:
  output: release
files:
  - dist/**/*
  - dist-renderer/**/*
  - assets/**/*
  - package.json
extraMetadata:
  main: dist/main/index.js
mac:
  target: dmg
win:
  target:
    - target: nsis
      arch: x64
linux:
  target: AppImage
asar: false
defaultArch: x64