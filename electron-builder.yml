appId: com.desktop-todo-list.app
productName: Desktop Todo
directories:
  output: release
files:
  - dist/**/*
  - dist-renderer/**/*
  - package.json
extraMetadata:
  main: dist/main/index.js
mac:
  target: dmg
win:
  target:
    - target: nsis
      arch: x64
linux:
  target: AppImage
asar: false
npmRebuild: true
defaultArch: x64