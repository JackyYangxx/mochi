appId: com.desktop-todo-list.app
productName: Desktop Todo
directories:
  output: release
files:
  - dist/**/*
  - dist-renderer/**/*
  - package.json
extraMetadata:
  main: dist/main/index.js
mac:
  target: dmg
win:
  target: nsis
linux:
  target: AppImage
asar: true
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**/*"
npmRebuild: true